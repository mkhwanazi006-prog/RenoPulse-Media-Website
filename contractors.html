<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified Listings | RenoPulse Media Network</title>
    <link rel="stylesheet" href="contractors.css">
    <link rel="icon" type="image/png" href="logo.jpeg">
</head>
<body class="dir-body">

    <!-- ==========================================================================
         SECTION 1: HEADER NAVIGATION
         ========================================================================== -->
    <header class="dir-header">
        <div class="dir-logo">Reno<span class="dir-gold">Pulse</span> Media</div>
        <a href="index.html" class="dir-back-btn">&larr; Back to Home</a>
    </header>

    <!-- ==========================================================================
         SECTION 2: DYNAMIC BANNER TITLE
         ========================================================================== -->
    <section class="dir-banner">
        <p class="dir-subtitle">VERIFIED SPECIALISTS</p>
        <h1 id="dirCategoryTitle" class="dir-title">Contractors</h1>
        <p class="dir-desc">Showing vetted local experts available for this category.</p>
    </section>

    <!-- ==========================================================================
         SECTION 3: INTERACTIVE PLATFORM FILTER ENGINE BAR
         ========================================================================== -->
    <div class="client-search-wrapper">
        <form id="contractorSearchForm" class="search-input-relative">
            <input type="text" id="clientContractorSearch" placeholder="Search contractors by name, location, or specialized key skills...">
            <button type="submit" style="background: #c29438; color: #000; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 10px; cursor: pointer; font-weight: bold;">Search</button>
        </form>
    </div>

    <!-- ==========================================================================
         SECTION 4: DYNAMIC INJECTION CARDS GRID INTERFACE
         ========================================================================== -->
    <main class="dir-container">
        <div id="contractor-grid" class="contractors-grid">
            <!-- Central JavaScript Engine populates custom content filters dynamically here -->
        </div>
    </main>

    <!-- Embedded Verification Systems Engine Link -->
    <script src="contractors.js"></script>
</body>
</html>
